<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./bootstrap.min.css" />
    <title>Unit Converter</title>
    <style>
      label {
        font-size: 30px;
      }
      button {
        width: 100px;
      }
      select {
        width: 10%;
        height: 10%;
      }
    </style>
  </head>
  <body class="">
    <section class="container text-center mt-3">
      <h1>
        <strong>Unit Converter </strong>
      </h1>
      <h5 class="">Convert units from different measurement</h5>
    </section>
    <nav class="navbar navbar-expand-md bg-body-tertiary navbar-light">
      <div class="container">
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-3">
            <li class="nav-item">
              <a href="length.html" class="nav-link">Length</a>
            </li>
            <li class="nav-item">
              <a href="weight.html" class="nav-link">Weight</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link active">Temperature</a>
            </li>
          </ul>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav"></div>
      </div>
    </nav>
    <section class="container text-center mt-3">
      <div>
        <label for="inputLength">Enter the Temperature to convert:</label>
        <input type="number" id="inputLength" />
      </div>
      <div class="mt-1">
        <label>From: </label>
        <select name="" id="input">
          <option value="celcius">Celcius</option>
          <option value="fahrenheit">Fahrenheit</option>
          <option value="kelvin">Kelvin</option>
          <option value="reamur">Reamur</option>
        </select>
      </div>
      <div class="mt-1">
        <label>Convert to: </label>
        <select name="" id="output">
          <option value="celcius">Celcius</option>
          <option value="fahrenheit">Fahrenheit</option>
          <option value="kelvin">Kelvin</option>
          <option value="reamur">Reamur</option>
        </select>
      </div>
      <div class="mt-4">
        <button class="btn btn-success" onclick="convert()">Convert</button>
      </div>
      <div class="mt-3">
        <h1>Result: <small id="result"></small></h1>
      </div>
    </section>
    <script>
      const inputLength = document.getElementById("inputLength");
      const result = document.getElementById("result");

      function convert() {
        const input = document.getElementById("input").value;
        const output = document.getElementById("output").value;

        let value = Number(inputLength.value);
        let temp;

        switch (input) {
          case "celcius":
            temp = value;
            break;
          case "fahrenheit":
            temp = (value - 32)/1.8;
            break;
          case "kelvin":
            temp = value - 273.15;
            break;
          case "reamur":
            temp = value *1.25;
            break;
        }

        let finalValue;

        switch (output) {
          case "celcius":
            finalValue = temp;
            result.textContent = finalValue + " °";
            break;
          case "fahrenheit":
            finalValue = 32+(temp * 1.8);
            result.textContent = finalValue + " °";
            break;
          case "kelvin":
            finalValue = temp + 273.15;
            result.textContent = finalValue + " °";
            break;
          case "reamur":
            finalValue = temp/1.25;
            result.textContent = finalValue + " °";
            break;
        }
      }
    </script>
    <script src="./bootstrap.bundle.min.js"></script>
  </body>
</html>
