<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./bootstrap.min.css" />
    <title>Unit Converter</title>
    <style>
      label {
        font-size: 30px;
      }
      button {
        width: 100px;
      }
      select {
        width: 10%;
        height: 10%;
      }
    </style>
  </head>
  <body class="">
    <section class="container text-center mt-3">
      <h1>
        <strong>Unit Converter </strong>
      </h1>
      <h5 class="">Convert units from different measurement</h5>
    </section>
    <nav class="navbar navbar-expand-md bg-body-tertiary navbar-light">
      <div class="container">
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-3">
            <li class="nav-item">
              <a href="length.html" class="nav-link">Length</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link active">Weight</a>
            </li>
            <li class="nav-item">
              <a href="temp.html" class="nav-link">Temperature</a>
            </li>
          </ul>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav"></div>
      </div>
    </nav>
    <section class="container text-center mt-3">
      <div class="">
        <label for="inputLength">Enter the Weight to convert:</label>
        <input type="number" id="inputLength" />
      </div>
      <div class="mt-1">
        <label for="input">From: </label>
        <select name="" id="input">
          <option value="gram">Gram</option>
          <option value="kilogram">Kilogram</option>
          <option value="ton">Ton</option>
        </select>
      </div>
      <div class="mt-1">
        <label for="output">Convert to: </label>
        <select name="" id="output">
          <option value="gram">Gram</option>
          <option value="kilogram">Kilogram</option>
          <option value="ton">Ton</option>
        </select>
      </div>
      <div class="mt-4">
        <button class="btn btn-success" onclick="convert()">Convert</button>
      </div>
      <div class="mt-3">
        <h1>Result: <small id="result"></small></h1>
      </div>
    </section>
    <script>
      const inputLength = document.getElementById("inputLength");
      const result = document.getElementById("result");

      function convert() {
        const input = document.getElementById("input").value;
        const output = document.getElementById("output").value;

        let value = Number(inputLength.value);
        let gram;

        switch (input) {
          case "gram":
            gram = value;
            break;
          case "kilogram":
            gram = value * 1000;
            break;
          case "ton":
            gram = value * 1000000;
            break;
        }
        let finalValue;

        switch (output) {
          case "gram":
            finalValue = gram;
            result.textContent = finalValue + " g";
            break;
          case "kilogram":
            finalValue = gram / 1000;
            result.textContent = finalValue + " kg";
            break;
          case "ton":
            finalValue = gram / 1000000;
            result.textContent = finalValue + " ton";
            break;
        }
      }
    </script>
    <script src="./bootstrap.bundle.min.js"></script>
  </body>
</html>
